name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # 不需要 submodule —— GitHub Pages 只发布 tutorial/ 静态文件
        with:
          submodules: false

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (tutorial/ only)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./tutorial

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
